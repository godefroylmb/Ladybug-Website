name: CI/CD - Build & Deploy Next.js app

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: godefroylmb/ladybug:latest
          platforms: linux/arm64

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT }}
          script: |
            docker pull godefroylmb/ladybug:latest
            docker stop ladybug || true
            docker rm ladybug || true
            docker run -d \
              --name ladybug \
              --network caddy_net \
              --restart unless-stopped \
              -p 8193:8193 \
              godefroylmb/ladybug:latest
